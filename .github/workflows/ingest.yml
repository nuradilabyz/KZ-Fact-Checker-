name: Hourly News Ingestion

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch: # manual trigger button

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/ingestion.txt

      - name: Install Python dependencies
        run: pip install -r requirements/ingestion.txt

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull llama3.2
          echo "Ollama ready with llama3.2"

      - name: Ingest reference sources (scrape + embed)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FETCH_DELAY_SECONDS: "1.5"
        run: |
          python -c "
          from ingestion.news_scraper import run_source_ingestion
          for source in ['factcheck', 'azattyq', 'informburo', 'tengrinews']:
              try:
                  run_source_ingestion(source, months_back=1)
              except Exception as e:
                  print(f'WARN: {source} failed: {e}')
          "

      - name: Ingest ZTB + extract claims + verify
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OLLAMA_URL: http://localhost:11434
          OLLAMA_MODEL: llama3.2
          FETCH_DELAY_SECONDS: "1.5"
        run: |
          python -c "
          from ingestion.news_scraper import run_source_ingestion
          run_source_ingestion('ztb', months_back=1)
          "
